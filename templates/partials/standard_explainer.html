            onclick="standardExplainer.toggleExplanation(this.closest('.standard-item'), '{{ standard.id }}')">

<style>
/* Standard Explainer Styles */
.standard-explainer-wrapper {
    margin-top: 1rem;
}

.standard-explanation-container {
    margin-top: 1rem;
    padding: 1.5rem;
    background: var(--bg-card, #0f3460);
    border: 1px solid var(--border-color, rgba(255, 255, 255, 0.1));
    border-radius: 8px;
    animation: slideDown 0.3s ease-out;
}

@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Explanation Header */
.explanation-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border-color, rgba(255, 255, 255, 0.1));
}

.explanation-title {
    margin: 0;
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--text-primary, #e0e0e0);
}

/* Explanation Content */
.explanation-content {
    margin-bottom: 1.5rem;
}

.plain-english {
    font-size: 1rem;
    line-height: 1.6;
    color: var(--text-primary, #e0e0e0);
    margin: 0;
}

/* Explanation Sections */
.explanation-section {
    margin-bottom: 1.5rem;
}

.explanation-section h4 {
    font-size: 1rem;
    font-weight: 600;
    color: var(--accent, #e94560);
    margin-bottom: 0.75rem;
}

/* Evidence List */
.evidence-list {
    list-style: none;
    padding: 0;
    margin: 0;
}

.evidence-item {
    display: flex;
    align-items: flex-start;
    padding: 0.5rem;
    margin-bottom: 0.5rem;
    background: var(--bg-secondary, #16213e);
    border-radius: 4px;
    cursor: pointer;
    transition: background-color 0.2s;
}

.evidence-item:hover {
    background: var(--bg-primary, #1a1a2e);
}

.evidence-checkbox {
    margin-right: 0.75rem;
    margin-top: 0.25rem;
    flex-shrink: 0;
}

.evidence-item span {
    flex: 1;
    color: var(--text-primary, #e0e0e0);
}

.mistakes-list {
    list-style: none;
    padding: 0;
    margin: 0;
}

.mistakes-list li {
    position: relative;
    padding-left: 1.5rem;
    margin-bottom: 0.5rem;
    color: var(--warning, #fbbf24);
}

.mistakes-list li::before {
    content: "⚠";
    position: absolute;
    left: 0;
    top: 0;
    font-size: 1rem;
}

/* Regulatory Context (Collapsible) */
.explanation-context {
    margin-top: 1.5rem;
    padding: 1rem;

    border-radius: 4px;
}

.explanation-context summary {
    font-weight: 600;
    color: var(--accent, #e94560);
    cursor: pointer;
    user-select: none;
}

.explanation-context summary:hover {
    color: var(--text-primary, #e0e0e0);
}

.explanation-context p {
    margin-top: 0.75rem;
    margin-bottom: 0;
    color: var(--text-secondary, #b0b0b0);
    line-height: 1.6;
}

/* Warning for Low Confidence */
.explanation-warning {
    margin-top: 1rem;
    padding: 0.75rem;
    background: rgba(251, 191, 36, 0.1);
    border: 1px solid var(--warning, #fbbf24);
    border-radius: 4px;
    color: var(--warning, #fbbf24);
    font-size: 0.875rem;
}

.explanation-warning strong {
    font-weight: 600;
}

/* Loading State */
.explanation-loading {
    padding: 1rem 0;
}

.skeleton {
    background: linear-gradient(
        90deg,
        rgba(255, 255, 255, 0.05) 0%,
        rgba(255, 255, 255, 0.1) 50%,
        rgba(255, 255, 255, 0.05) 100%

    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
    margin-bottom: 0.75rem;
}

.skeleton-title {
    height: 1.5rem;
    width: 60%;
}

.skeleton-text {
    height: 1rem;
    width: 100%;
}

@keyframes shimmer {
    0% {

    }
    100% {

    }
}

.explanation-error {

}

.error-message {

.btn-explain {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
}

.btn-icon {

    background: transparent;
    border: none;
    color: var(--text-secondary, #b0b0b0);
    cursor: pointer;
    transition: color 0.2s;
}

.btn-icon:hover {
    color: var(--text-primary, #e0e0e0);
}
