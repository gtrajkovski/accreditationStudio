<!-- Coverage Verification Partial for Packet Studio -->
<!-- Displays evidence coverage by standard and blocking issues -->

<div class="coverage-container">
    <!-- Progress Summary -->
    <div class="coverage-summary">
        <div class="coverage-stat">
            <div class="stat-label">Standards Covered</div>
            <div class="stat-value">
                <span id="coveredCount">0</span> / <span id="totalStandards">0</span>
            </div>
            <div class="progress-bar">
                <div id="coverageProgress" class="progress-fill" style="width: 0%;"></div>
            </div>
        </div>
        <div class="coverage-stat">
            <div class="stat-label">Missing Evidence</div>
            <div class="stat-value text-danger" id="missingCount">0</div>
        </div>
        <div class="coverage-stat">
            <div class="stat-label">Blocking Issues</div>
            <div class="stat-value text-danger" id="blockingCount">0</div>
        </div>
    </div>

    <!-- Blocking Issues Panel (shown only if issues exist) -->
    <div id="blockingIssuesPanel" class="blocking-issues-panel" style="display: none;">
        <div class="panel-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;">
                <circle cx="12" cy="12" r="10"/>
                <line x1="15" y1="9" x2="9" y2="15"/>
                <line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
            <h4>Blocking Issues</h4>
        </div>
        <p class="panel-description">These critical findings must be resolved before export is allowed.</p>
        <div id="blockingIssuesList"></div>
        <div class="panel-actions">
            <a href="#" class="btn btn-secondary btn-sm" onclick="goToFindings(); return false;">Go to Findings</a>
        </div>
    </div>

    <!-- Standards Coverage List -->
    <div class="standards-coverage-list">
        <div class="list-header">
            <h4>Standards Evidence Coverage</h4>
            <div class="list-controls">
                <button class="btn btn-ghost btn-sm" onclick="expandAllStandards()">Expand All</button>
                <button class="btn btn-ghost btn-sm" onclick="collapseAllStandards()">Collapse All</button>
                <label class="filter-toggle">
                    <input type="checkbox" id="showMissingOnly" onchange="toggleMissingFilter()">
                    <span>Show Missing Only</span>
                </label>
            </div>
        </div>

        <div id="standardsList" class="standards-list">
            <!-- Standards will be rendered here -->
            <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 48px; height: 48px; margin-bottom: var(--spacing-md);">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 8v4M12 16h.01"/>
                </svg>
                <p>No validation data available. Click "Validate" to check coverage.</p>
            </div>
        </div>
    </div>

    <!-- Export Status Message -->
    <div id="exportStatusMessage" class="export-status-message" style="display: none;">
        <!-- Dynamically populated based on validation state -->
    </div>
</div>
