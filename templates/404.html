{% extends "base.html" %}

{% block title %}Not Found - AccreditAI{% endblock %}
{% block header_title %}Page Not Found{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 100px auto; text-align: center;">
    <div style="font-size: 72px; color: var(--text-muted); margin-bottom: var(--spacing-lg);">404</div>
    <h2 style="margin-bottom: var(--spacing-md);">Page Not Found</h2>
    <p class="text-muted" style="margin-bottom: var(--spacing-lg);">
        The page you're looking for doesn't exist or has been moved.
    </p>
    <a href="{{ url_for('dashboard') }}" class="btn btn-primary">
        Back to Dashboard
    </a>
</div>
{% endblock %}
