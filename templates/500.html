{% extends "base.html" %}

{% block title %}Server Error - AccreditAI{% endblock %}
{% block header_title %}Server Error{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 100px auto; text-align: center;">
    <div style="font-size: 72px; color: var(--error); margin-bottom: var(--spacing-lg);">500</div>
    <h2 style="margin-bottom: var(--spacing-md);">Something Went Wrong</h2>
    <p class="text-muted" style="margin-bottom: var(--spacing-lg);">
        An unexpected error occurred. Please try again later.
    </p>
    <a href="{{ url_for('dashboard') }}" class="btn btn-primary">
        Back to Dashboard
    </a>
</div>
{% endblock %}
